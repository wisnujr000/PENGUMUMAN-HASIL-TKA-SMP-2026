<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengumuman Hasil TKA SMP 2026</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eaf4ff;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-top: 8px solid #0d6efd;
        }

        h1 {
            color: #0d6efd;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #0d6efd;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }

        #hasil {
            margin-top: 20px;
            font-weight: bold;
        }

        /* FOTO BAWAH */
        .footer-img {
            margin-top: 40px;
        }

        .footer-img img {
            width: 300px;
            border-radius: 10px;
        }

        .footer-text {
            margin-top: 10px;
            color: #0d6efd;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Pengumuman Hasil TKA SMP 2026</h1>
    <p>Masukkan Nama Peserta</p>

    <input type="text" id="nama" placeholder="Contoh: Budi Santoso">
    <br>
    <button onclick="cekHasil()">Cek Hasil</button>

    <div id="hasil"></div>
</div>

<!-- FOTO BAGIAN BAWAH -->
<div class="footer-img">
    <img src="https://via.placeholder.com/300x150.png?text=Pengumuman+TKA+2026" alt="Foto Pengumuman">
    <div class="footer-text">© 2026 Panitia TKA SMP</div>
</div>

<script>
    function cekHasil() {
        let nama = document.getElementById("nama").value;
        let hasil = document.getElementById("hasil");

        if (nama.trim() === "") {
            hasil.innerHTML = "Silakan masukkan nama peserta!";
        } else {
            let lulus = Math.random() > 0.5;

            if (lulus) {
                hasil.innerHTML = `
                    Nama Peserta: ${nama} <br>
                    <span style="color:green;">Hasil: LULUS 🎉</span>
                `;
            } else {
                hasil.innerHTML = `
                    Nama Peserta: ${nama} <br>
                    <span style="color:red;">Hasil: TIDAK LULUS ❌</span>
                `;
            }
        }
    }
</script>

</body>
</html>
